<!DOCTYPE html>
<html>
<head>
    <title>AI Disaster Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🌍 AI Disaster Response Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>📍 Zone Info</h2>
      <p>📍 Location: <span id="zone">No Data</span></p>
<p>👥 People: <span id="people">No Data</span></p>
<p>🤕 Injured: <span id="injured">No Data</span></p>
<p>🍲 Food Needed: <span id="food">No Data</span></p>
<p>🚤 Rescue Needed: <span id="rescue">No Data</span></p>


    </div>

    <div class="card">
        <h2>🤖 Decision</h2>
        <p>🚑 Action: <span id="action">-</span></p>
      <p>⚡ Priority: <span id="priority"></span></p>


        <p>🧠 Reason: <span id="reason">-</span></p>
        <p>⭐ Reward: <span id="reward">0</span></p>
        <p>📊 Score: <span id="score">0</span></p>
    </div>

</div>

<button onclick="runStep()">▶ Run</button>
<button onclick="resetEnv()">🔄 Reset</button>

<script src="/static/script.js"></script>
</body>
</html>
